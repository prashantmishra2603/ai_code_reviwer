version: '3.8'

services:
  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-code-reviewer-backend
    ports:
      - "8000:8000"
    environment:
      - API_TITLE=AI Code Reviewer
      - API_VERSION=1.0.0
      - SECRET_KEY=your-secure-secret-key-change-in-production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - DATABASE_URL=sqlite:///./code_reviewer.db
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - CHROMA_DB_PATH=./vector_db
      - CORS_ORIGINS=["http://localhost:3000", "http://localhost:5173"]
      - MAX_UPLOAD_SIZE=52428800
      - UPLOAD_DIR=./uploads
      - HOST=0.0.0.0
      - PORT=8000
      - RELOAD=false
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/vector_db:/app/vector_db
    depends_on:
      - postgres
    networks:
      - ai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-code-reviewer-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://backend:8000/api
    depends_on:
      - backend
    networks:
      - ai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # PostgreSQL Database (Optional - for production)
  postgres:
    image: postgres:15-alpine
    container_name: ai-code-reviewer-postgres
    environment:
      - POSTGRES_DB=code_reviewer
      - POSTGRES_USER=reviewer
      - POSTGRES_PASSWORD=secure-password-change-this
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reviewer"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache (Optional)
  redis:
    image: redis:7-alpine
    container_name: ai-code-reviewer-redis
    networks:
      - ai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  ai-network:
    driver: bridge

volumes:
  postgres_data:
